name: Release

on:
  release: 
    types:
      - published

permissions:
  contents: write
  pages: write

jobs:
  
  build:
    name: Build ${{ matrix.profile }}
    runs-on: ${{ matrix.os }}

    strategy:
      max-parallel: 1
      fail-fast: true
      matrix:
        include:

          - os: ubuntu-latest
            profile: Linux
            build-target: StandaloneLinux64
            modules: linux-mono

          - os: ubuntu-latest
            profile: WebGL
            build-target: WebGL
            modules: webgl

          - os: windows-latest
            profile: Windows
            build-target: StandaloneWindows64
            modules: windows-mono
    
    env:
      OUT: Build/${{ matrix.build-target }}
    
    steps:

      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: buildalon/unity-setup@v2.6.0
        with:
          version-file: ProjectSettings/ProjectVersion.txt
          modules: ${{ matrix.modules }}

      - uses: buildalon/activate-unity-license@v2.2.2
        with:
          license: Personal
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - uses: actions/cache@v6.1.0
        with:
          path: Library
          key: Library-${{ matrix.profile }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ matrix.profile }}-
            Library-

      - uses: buildalon/unity-action@v3.1.0
        with:
          args: -quit -nographics -batchmode -executeMethod Build.${{ matrix.profile }}
          
      - name: Clean Directory
        working-directory: ${{ env.OUT }}
        shell: bash
        run: rm -r *DoNotShip* || true
          
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.profile }}
          path: ${{ env.OUT }}
          if-no-files-found: error
          
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    
    permissions: 
      pages: write
      id-token: write
    
    steps:
      - uses: actions/download-artifact@v8
        name: WebGL
        
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: Budapest-Metro/
        
      - uses: actions/deploy-pages@v5.0.0
  
  release:
    name: Upload release assets
    needs: build
    runs-on: ubuntu-latest
    
    steps:

      - uses: actions/download-artifact@v8
        with:
          name: Linux
          skip-decompress: true

      - uses: actions/download-artifact@v8
        with:
          name: Windows
          skip-decompress: true

      - run: |
          mv Linux.zip Budapest-Metro-linux-x64.zip
          mv Windows.zip Budapest-Metro-win-x64.zip

      - uses: softprops/action-gh-release@v3.0.0
        with:
          files: Budapest-Metro-*.zip